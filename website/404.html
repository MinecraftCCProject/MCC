<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — Minecraft Control Center</title>
  <meta name="description" content="The requested Minecraft Control Center page could not be found.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#07110d">
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/svg+xml" href="/MCC/favicon.svg">
  <link rel="stylesheet" href="/MCC/style.css">
  <script src="/MCC/script.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content" data-i18n="accessibility.skip">Skip to content</a>
  <div class="page-grid" aria-hidden="true"></div>
  <div class="page-glow page-glow--one" aria-hidden="true"></div>

  <a class="brand error-brand" href="/MCC/" aria-label="Minecraft Control Center home" data-i18n-aria-label="nav.homeLabel">
    <span class="brand-mark" aria-hidden="true"><span>M</span></span>
    <span class="brand-copy"><strong>MCC</strong><small>CONTROL CENTER</small></span>
  </a>

  <div class="language-switcher error-language" role="group" aria-label="Language" data-i18n-aria-label="language.label">
    <button type="button" data-language="en" aria-pressed="true">EN</button>
    <span aria-hidden="true">/</span>
    <button type="button" data-language="fr" aria-pressed="false">FR</button>
  </div>

  <main class="error-page" id="main-content">
    <div class="error-shell">
      <span class="error-code" aria-hidden="true">404</span>
      <p class="section-tag">ROUTE_NOT_FOUND // 0x194</p>
      <h1 data-i18n="error.title">Page not found</h1>
      <p data-i18n="error.message">The requested route is outside the mapped system. Return to the MCC home page to continue.</p>
      <a class="button button--primary" href="/MCC/"><span data-i18n="error.home">Return home</span><span aria-hidden="true">→</span></a>
    </div>
  </main>
</body>
</html>
